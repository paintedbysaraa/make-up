name: Sync to Sara Repo

on:
  push:
    branches: [ "main" ]

jobs:
  sync:
    runs-on: ubuntu-latest  # OVO ISPRAVLJENO - SAMO JEDNO 'L'
    steps:
      # 1. Preuzmi kod
      - name: Checkout source code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2. Podesi SSH ključ
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SARA_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      # 3. Push (Sada ce raditi jer repo postoji)
      - name: Mirror to Sara Account
        run: |
          git config --global user.name "tpktehnoco"
          git config --global user.email "tpktehnoco@users.noreply.github.com"
          git remote add mirror git@github.com:paintedbysaraa/make-up.git
          git push mirror main --force
